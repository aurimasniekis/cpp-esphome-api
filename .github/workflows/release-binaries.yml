name: Release binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Which target(s) to build (manual runs only)"
        type: choice
        default: all
        options:
          - all
          - linux-x86_64
          - linux-arm64
          - macos-intel
          - macos-arm64
          - windows-x86_64

permissions:
  contents: write

jobs:
  # Resolve the build matrix so a manual run can build a single target (fast
  # iteration when testing one platform) while release events always build all.
  setup:
    name: Resolve matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - id: resolve
        shell: bash
        env:
          # Empty on release events -> falls through to "all".
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          # Build on the oldest supported runner image so the released binaries
          # keep a low glibc baseline (22.04 ships glibc 2.35); building on
          # ubuntu-latest (24.04, glibc 2.39) bakes in GLIBC_2.36+ symbols that
          # fail to run on older servers.
          #
          # Windows is pinned to windows-2022 + the v142 (14.29) toolset on
          # purpose: the default v143 STL (VS 2022 17.10+) made std::mutex's
          # constructor constexpr, changing its ABI. A shared-CRT binary built
          # that way misbehaves on machines with an older msvcp140.dll (Asio's
          # io_context locks internally), surfacing as connection resets /
          # "End of file". v142 keeps the old mutex constructor, matching the
          # widely-installed redistributable; windows-2022 ships it preinstalled.
          all='[
            {"os":"ubuntu-22.04","target":"linux-x86_64"},
            {"os":"ubuntu-22.04-arm","target":"linux-arm64"},
            {"os":"macos-15-intel","target":"macos-intel"},
            {"os":"macos-15","target":"macos-arm64"},
            {"os":"windows-2022","target":"windows-x86_64","experimental":true}
          ]'
          target="${TARGET:-all}"
          if [ "$target" = "all" ]; then
            include="$(jq -c '.' <<<"$all")"
          else
            include="$(jq -c --arg t "$target" '[.[] | select(.target == $t)]' <<<"$all")"
          fi
          # jq -c keeps this on a single line, required for the key=value form.
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.target }}
    needs: setup
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure + build (Unix)
        if: runner.os != 'Windows'
        run: |
          set -e
          args=(
            -S . -B build
            -DCMAKE_BUILD_TYPE=Release
            -DESPHOME_API_BUILD_CLI=ON
            -DESPHOME_API_BUILD_TESTS=OFF
            -DESPHOME_API_BUILD_EXAMPLES=OFF
            -DESPHOME_API_INSTALL=OFF
          )
          if [ "$RUNNER_OS" = "Linux" ]; then
            args+=("-DCMAKE_EXE_LINKER_FLAGS=-static-libgcc -static-libstdc++")
          fi
          cmake "${args[@]}"
          cmake --build build --config Release --target esphome-cli -j 4

      - name: Configure + build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -T v142 `
            -DCMAKE_BUILD_TYPE=Release `
            -DESPHOME_API_BUILD_CLI=ON `
            -DESPHOME_API_BUILD_TESTS=OFF `
            -DESPHOME_API_BUILD_EXAMPLES=OFF `
            -DESPHOME_API_INSTALL=OFF
          cmake --build build --config Release --target esphome-cli -j 4

      # --- package + publish --------------------------------------------------
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp build/bin/esphome-cli "dist/esphome-cli-${{ matrix.target }}"
          strip "dist/esphome-cli-${{ matrix.target }}" || true

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $exe = if (Test-Path build/bin/Release/esphome-cli.exe) { 'build/bin/Release/esphome-cli.exe' } else { 'build/bin/esphome-cli.exe' }
          Copy-Item $exe "dist/esphome-cli-${{ matrix.target }}.exe"

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*

      - name: Upload artifact (manual runs)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v7
        with:
          name: esphome-cli-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
