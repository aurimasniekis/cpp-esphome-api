name: Release binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build on the oldest supported runner image so the released binaries
          # keep a low glibc baseline (22.04 ships glibc 2.35); building on
          # ubuntu-latest (24.04, glibc 2.39) bakes in GLIBC_2.36+ symbols that
          # fail to run on older servers.
          - os: ubuntu-22.04
            target: linux-x86_64
          - os: ubuntu-22.04-arm
            target: linux-arm64
          - os: macos-15-intel
            target: macos-intel
          - os: macos-15
            target: macos-arm64
          - os: windows-latest
            target: windows-x86_64
            experimental: true
    steps:
      - uses: actions/checkout@v6

      - name: Configure + build (Unix)
        if: runner.os != 'Windows'
        run: |
          set -e
          args=(
            -S . -B build
            -DCMAKE_BUILD_TYPE=Release
            -DESPHOME_API_BUILD_CLI=ON
            -DESPHOME_API_BUILD_TESTS=OFF
            -DESPHOME_API_BUILD_EXAMPLES=OFF
            -DESPHOME_API_INSTALL=OFF
          )
          if [ "$RUNNER_OS" = "Linux" ]; then
            args+=("-DCMAKE_EXE_LINKER_FLAGS=-static-libgcc -static-libstdc++")
          fi
          cmake "${args[@]}"
          cmake --build build --config Release --target esphome-cli -j 4

      - name: Configure + build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DESPHOME_API_BUILD_CLI=ON `
            -DESPHOME_API_BUILD_TESTS=OFF `
            -DESPHOME_API_BUILD_EXAMPLES=OFF `
            -DESPHOME_API_INSTALL=OFF
          cmake --build build --config Release --target esphome-cli -j 4

      # --- package + publish --------------------------------------------------
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp build/bin/esphome-cli "dist/esphome-cli-${{ matrix.target }}"
          strip "dist/esphome-cli-${{ matrix.target }}" || true

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $exe = if (Test-Path build/bin/Release/esphome-cli.exe) { 'build/bin/Release/esphome-cli.exe' } else { 'build/bin/esphome-cli.exe' }
          Copy-Item $exe "dist/esphome-cli-${{ matrix.target }}.exe"

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*

      - name: Upload artifact (manual runs)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v7
        with:
          name: esphome-cli-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
