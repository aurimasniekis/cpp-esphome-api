name: Release packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build .deb/.rpm on the oldest supported runner image so the packaged
          # binary keeps a low glibc baseline (22.04 ships glibc 2.35); the
          # Debian Depends are derived from the binary via dpkg-shlibdeps.
          - os: ubuntu-22.04
            target: linux-x86_64
          - os: ubuntu-22.04-arm
            target: linux-arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install packaging tools
        run: |
          sudo apt-get update
          # rpm provides rpmbuild for CPack's RPM generator; dpkg-dev (for
          # dpkg-shlibdeps) ships on the runner image already.
          sudo apt-get install -y rpm

      - name: Configure + build CLI
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DESPHOME_API_BUILD_CLI=ON \
            -DESPHOME_API_BUILD_TESTS=OFF \
            -DESPHOME_API_BUILD_EXAMPLES=OFF \
            -DESPHOME_API_INSTALL=OFF \
            -DESPHOME_API_INSTALL_CLI=ON
          cmake --build build --config Release --target esphome-cli -j 4

      - name: Build deb + rpm
        run: |
          set -e
          mkdir -p dist
          # Match the package version to the release tag (strip a leading "v").
          # Falls back to the project version for manual (workflow_dispatch) runs.
          version="${{ github.event.release.tag_name }}"
          version="${version#v}"
          verarg=()
          if [ -n "$version" ]; then
            verarg=(-D "CPACK_PACKAGE_VERSION=$version")
          fi
          cpack --config build/CPackConfig.cmake -G DEB "${verarg[@]}" -B dist
          cpack --config build/CPackConfig.cmake -G RPM "${verarg[@]}" -B dist
          rm -rf dist/_CPack_Packages
          ls -la dist

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.deb
            dist/*.rpm

      - name: Upload artifact (manual runs)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v7
        with:
          name: esphome-cli-packages-${{ matrix.target }}
          path: |
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error
